name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: ruff (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: ruff check
        run: ruff check .

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck embedder.sh scripts/*.sh experimental/*.sh
